name: Build and Deploy AutoPiano

on:
  push:
    branches:
      - master # 确保对应你的主分支名

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 使用最新的虚拟机，排队最快

    steps:
      # 1. 拉取代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 将 Node 版本提升到 12，满足 pixelsmith 的最低要求
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '12'

      # 3. 核心改动：加上 --ignore-engines，强行忽略所有版本不兼容的报错
      - name: Install Dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      # 4. 强行执行打包
      - name: Build Project
        run: npx webpack --config build/webpack.prod.conf.js
