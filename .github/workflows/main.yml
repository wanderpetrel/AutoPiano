name: Build and Deploy AutoPiano

on:
  push:
    branches:
      - master # 确保对应你的主分支名

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 使用最新的虚拟机，排队最快

    steps:
      # 1. 拉取代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 将 Node 版本提升到 12，满足 pixelsmith 的最低要求
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '12'

      # 3. 核心改动：加上 --ignore-engines，强行忽略所有版本不兼容的报错
      - name: Install Dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      # 4. 强行执行打包并自动精准修补 index.html
      - name: Build Project
        run: |
          # 1. 正常跑 Webpack 打包（生成 static/js 和 static/png）
          npx webpack --config build/webpack.conf.js
          
          # 2. 把根目录的 index.html 复制到 dist 目录
          cp index.html dist/
          
          # 3. 循环遍历打包出的 3 个 JS 文件，并把绝对路径变成相对路径，精准替换掉那句注释
          cd dist
          for jsfile in static/js/*.js; do
            # 将带有哈希值的 js 文件包装成 <script> 标签，插入到注释行的上方
            sed -i "s||<script type=\"text/javascript\" src=\"$jsfile\"></script>\n|g" index.html
          done

      # 5. 部署（如果不需要可以删掉）
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
